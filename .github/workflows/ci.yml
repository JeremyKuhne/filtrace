# Build and test filtrace on Windows and Linux.
#
# Linux ARM64 owns the cross-platform product and contract checks. Windows runs
# the full test suite plus the deterministic eval so Windows-only ETL and
# thread-time paths stay in the automatic gate without duplicating every
# cross-platform contract. A separate job verifies the pinned agent skills. The
# stable `ci` aggregator preserves the required status-check name while running
# on the cheapest hosted runner.
name: ci

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  agent-files:
    name: agent files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate pinned skills, overlays, and links
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./tools/Test-AgentSkills.ps1 -VerifyUpstream -ReferenceValidation

  build-linux:
    name: build (Linux ARM64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # MinVer derives the build version from git history and tags

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-${{ runner.arch }}-filtrace-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'Directory.Build.props', 'Directory.Build.targets', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-filtrace-nuget-

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore filtrace.slnx

      - name: Build
        run: dotnet build filtrace.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test filtrace.slnx --configuration Release --no-build

      - name: Help lint
        shell: pwsh
        run: ./tools/Test-CliHelp.ps1 -Configuration Release

      - name: MCP server check
        shell: pwsh
        run: ./tools/Test-McpServer.ps1 -Configuration Release

      - name: Docs drift check
        shell: pwsh
        run: ./tools/Test-Docs.ps1

  build-windows:
    name: build (Windows)
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # MinVer derives the build version from git history and tags

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-${{ runner.arch }}-filtrace-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'Directory.Build.props', 'Directory.Build.targets', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-filtrace-nuget-

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore filtrace.slnx

      - name: Build
        run: dotnet build filtrace.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test filtrace.slnx --configuration Release --no-build

      - name: Eval gate
        shell: pwsh
        run: ./eval/Invoke-Eval.ps1 -Configuration Release

  # The main ruleset requires this stable check name. `if: always()` and the
  # explicit result checks turn upstream failures or cancellations into a red
  # required check rather than a skipped one.
  ci:
    name: ci
    needs: [agent-files, build-linux, build-windows]
    if: always()
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - name: Verify CI jobs succeeded
        shell: bash
        run: |
          results=(
            "agent-files=${{ needs.agent-files.result }}"
            "build-linux=${{ needs.build-linux.result }}"
            "build-windows=${{ needs.build-windows.result }}"
          )
          failed=0
          for result in "${results[@]}"; do
            echo "$result"
            case "$result" in
              *=success) ;;
              *) failed=1 ;;
            esac
          done
          if [ "$failed" -ne 0 ]; then
            echo "::error::One or more CI jobs did not succeed."
            exit 1
          fi
