# Build and test filtrace on Windows and Linux.
#
# filtrace runs on .NET 10 only and reads traces produced by both modern .NET
# and .NET Framework. The capability matrix is cross-platform: most analysis
# works everywhere, while the Windows-only ETW (.etl) thread-time path is gated
# inside the tests, so the same suite runs on both OSes and skips what an OS
# cannot do.
#
# Product contract checks run after the suite, and a separate agent-files job
# verifies the pinned commons skill artifacts and repository overlays.
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  agent-files:
    name: agent files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate pinned skills, overlays, and links
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./tools/Test-AgentSkills.ps1 -VerifyUpstream -ReferenceValidation

  build-test:
    name: "build (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # MinVer derives the build version from git history and tags

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-filtrace-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'Directory.Build.props', 'Directory.Build.targets', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-filtrace-nuget-

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore filtrace.slnx

      - name: Build
        run: dotnet build filtrace.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test filtrace.slnx --configuration Release --no-build

      - name: Help lint
        shell: pwsh
        run: ./tools/Test-CliHelp.ps1 -Configuration Release

      - name: MCP server check
        shell: pwsh
        run: ./tools/Test-McpServer.ps1 -Configuration Release

      - name: Docs drift check
        shell: pwsh
        run: ./tools/Test-Docs.ps1

      - name: Eval gate
        shell: pwsh
        run: ./eval/Invoke-Eval.ps1 -Configuration Release

  # Single stable gate over the OS matrix. The `main` ruleset requires the `ci`
  # check; this job provides it, so adding or removing a matrix leg never needs a
  # ruleset edit. `if: always()` plus the explicit result test makes it fail (not
  # skip) when any build-test leg fails or is cancelled - a skipped required check
  # would otherwise leave a PR mergeable on a red matrix.
  ci:
    name: ci
    needs: [build-test, agent-files]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify the build matrix succeeded
        run: |
          if [ "${{ needs.build-test.result }}" != "success" ]; then
            echo "build-test result: ${{ needs.build-test.result }}"
            exit 1
          fi
          if [ "${{ needs.agent-files.result }}" != "success" ]; then
            echo "agent-files result: ${{ needs.agent-files.result }}"
            exit 1
          fi
          echo "Build-test and agent-file gates succeeded."

